name: resqlink_mobile 
description: ResQLink Guest Mobile App 
publish_to: 'none' 
version: 1.0.0+1 
 
environment: 
  sdk: '>=3.4.0 <4.0.0' 
 
dependencies: 
  flutter: 
    sdk: flutter 
  flutter_riverpod: ^2.5.1 
  riverpod_annotation: ^2.3.5 
  go_router: ^14.0.0 
  firebase_core: ^3.1.0 
  firebase_auth: ^5.1.0 
  cloud_firestore: ^5.1.0 
  firebase_database: ^11.0.0 
  firebase_messaging: ^15.0.0 
  camera: ^0.11.0
  mobile_scanner: ^5.1.1
  permission_handler: ^11.3.0
  web_socket_channel: ^3.0.0
  geolocator: ^12.0.0 
  uuid: ^4.4.0 
  intl: ^0.19.0
  google_fonts: ^6.2.1
  http: ^1.2.0
  connectivity_plus: ^6.0.3
  shared_preferences: ^2.2.3
  firebase_app_check: ^0.3.1+4

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/google_fonts/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/google_fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/google_fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/google_fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/google_fonts/Inter-Bold.ttf
          weight: 700
    - family: Fustat
      fonts:
        - asset: assets/fonts/google_fonts/Fustat-Regular.ttf
          weight: 400
        - asset: assets/fonts/google_fonts/Fustat-Medium.ttf
          weight: 500
        - asset: assets/fonts/google_fonts/Fustat-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/google_fonts/Fustat-Bold.ttf
          weight: 700
